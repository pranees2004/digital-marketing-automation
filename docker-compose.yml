version: "3.9"

services:
  # ── Main API Server ──
  api:
    build: .
    container_name: marketing-automation-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - DEBUG=true
      - LOG_LEVEL=INFO
    volumes:
      - .:/app
    command: python main.py --mode api
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - marketing-net

  # ── Background Scheduler (Daily/Weekly/Monthly workflows) ──
  scheduler:
    build: .
    container_name: marketing-scheduler
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - .:/app
    command: python main.py --mode scheduler
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - marketing-net

  # ── Redis (for task queue & caching) ──
  redis:
    image: redis:7-alpine
    container_name: marketing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - marketing-net

volumes:
  redis-data:

networks:
  marketing-net:
    driver: bridge
